spring:
  application:
    name: AI Kid Storybook Publisher

  datasource:
    url: jdbc:postgresql://localhost:5432/storybookdb
    username: storybook
    password: storybook123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  graphql:
    graphiql:
      enabled: true
    path: /graphql

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

ai:
  story:
    pages: 10
    age-range: 5-8
    words-per-page: 50
  image:
    width: 800
    height: 600
    style: "cartoon colorful kid friendly vibrant"